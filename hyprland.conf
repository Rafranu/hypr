# Syntax is the same as in Hypr, but settings might differ.
# Refer to the wiki for more information.

$phi=1.618
$phi_min=0.618

#Sourcing external config files
source=~/.config/hypr/configs/*

source=~/.config/hypr/configs/custom/*
# Cursor theme variable (set your preferred cursor theme here)
env = MiCursorAnime,Bibata-Modern-Classic
# Keep toolkit cursor env consistent (GTK/Qt/etc.)
env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,24

source=~/.config/hypr/configs/plugins/*
